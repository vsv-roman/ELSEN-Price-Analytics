<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Chart bars -->
  <rect x="80" y="280" width="64" height="152" rx="12" fill="url(#accent)" opacity="0.9"/>
  <rect x="168" y="200" width="64" height="232" rx="12" fill="url(#accent)" opacity="0.75"/>
  <rect x="256" y="240" width="64" height="192" rx="12" fill="url(#accent)" opacity="0.85"/>
  <rect x="344" y="160" width="64" height="272" rx="12" fill="url(#accent)"/>
  
  <!-- Trend line -->
  <polyline points="112,260 200,180 288,220 376,140" 
            fill="none" stroke="#22d3ee" stroke-width="8" 
            stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Dots on trend line -->
  <circle cx="112" cy="260" r="10" fill="#22d3ee"/>
  <circle cx="200" cy="180" r="10" fill="#22d3ee"/>
  <circle cx="288" cy="220" r="10" fill="#22d3ee"/>
  <circle cx="376" cy="140" r="10" fill="#22d3ee"/>
  
  <!-- ELSEN text -->
  <text x="256" y="100" text-anchor="middle" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="8">
    ELSEN
  </text>
  
  <!-- Subtitle -->
  <text x="256" y="480" text-anchor="middle" 
        font-family="system-ui, sans-serif" 
        font-size="28" fill="#94a3b8" font-weight="500">
    PRICE ANALYTICS
  </text>
</svg>
